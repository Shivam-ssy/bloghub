<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green-main: #4caf50;
            --green-bright: #00e676;
            --green-light: #69f0ae;
            --green-muted: #c8e6c9;
            --bg-dark: #0a1a0d;
            --bg-mid: #0f2313;
            --card-bg: rgba(76, 175, 80, 0.10);
            --border: rgba(102, 255, 178, 0.18);
            --text: #e8f5e9;
            --text-muted: #c8e6c9;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(76, 175, 80, 0.13) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0, 230, 118, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(105, 240, 174, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 26, 13, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #4caf50, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--green-bright);
            background: rgba(76, 175, 80, 0.1);
            border-color: var(--border);
        }

        .nav-link.primary {
            background: linear-gradient(135deg, #4caf50, #00e676);
            color: #0a1a0d;
            font-weight: 600;
            border-color: transparent;
        }

        .nav-link.primary:hover {
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transform: translateY(-1px);
            color: #0a1a0d;
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            min-height: calc(100vh - 64px);
        }

        /* ---- CARDS (from provided CSS) ---- */
        #greet {
            text-align: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
            font-size: 3rem;
            font-weight: 800;
            margin: 3rem 0 2.5rem;
            background: linear-gradient(135deg, #4caf50 0%, #00e676 50%, #69f0ae 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            animation: fadeInDown 0.8s ease-out;
        }

        .content-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            padding: 2rem 40px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 1s ease-out;
        }

        .card {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15) 0%, rgba(0, 230, 118, 0.15) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 255, 178, 0.2);
            padding: 0;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(0, 230, 118, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 60px rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .card:hover::before {
            opacity: 1;
        }

        .image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.6s ease;
            position: relative;
            z-index: 0;
        }

        .card:hover .image {
            transform: scale(1.08);
        }

        .card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1.5rem 1.5rem 0.8rem;
            color: #fff;
            line-height: 1.3;
            position: relative;
            z-index: 2;
            letter-spacing: -0.3px;
        }

        .card p {
            font-size: 1rem;
            color: #c8e6c9;
            margin: 0 1.5rem 1.5rem;
            line-height: 1.7;
            flex-grow: 1;
            position: relative;
            z-index: 2;
        }

        .view-more {
            background: linear-gradient(135deg, #4caf50 0%, #00e676 100%);
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 0 1.5rem 1.5rem;
            text-align: center;
            position: relative;
            z-index: 2;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .view-more::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .view-more:hover::before {
            left: 100%;
        }

        .view-more:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.6);
            background: linear-gradient(135deg, #00e676 0%, #4caf50 100%);
        }

        .view-more:active {
            transform: translateY(0);
        }

        /* ---- FORM STYLES ---- */
        .auth-wrap {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.12) 0%, rgba(0, 230, 118, 0.08) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102, 255, 178, 0.2);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(76, 175, 80, 0.05) inset;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4caf50, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .auth-card .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 36px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--green-muted);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(10, 26, 13, 0.6);
            border: 1px solid rgba(102, 255, 178, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: rgba(76, 175, 80, 0.6);
            background: rgba(10, 26, 13, 0.8);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.12), 0 0 20px rgba(76, 175, 80, 0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(200, 230, 201, 0.35);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group .file-input-wrap {
            position: relative;
        }

        .form-group input[type="file"] {
            padding: 10px 18px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group input[type="file"]::-webkit-file-upload-button {
            background: linear-gradient(135deg, #4caf50, #00e676);
            border: none;
            border-radius: 8px;
            color: #0a1a0d;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-right: 12px;
            transition: all 0.2s;
        }

        .tags-field {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(10, 26, 13, 0.6);
            border: 1px solid rgba(102, 255, 178, 0.2);
            border-radius: 12px;
            padding: 12px;
            min-height: 52px;
        }

        .tag-chip {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.35);
            color: var(--green-bright);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .tag-chip:hover,
        .tag-chip.selected {
            background: rgba(76, 175, 80, 0.4);
            border-color: var(--green-bright);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #4caf50 0%, #00e676 100%);
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 14px;
            color: #0a1a0d;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.3px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(76, 175, 80, 0.35);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(76, 175, 80, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .auth-footer a {
            color: var(--green-bright);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .auth-footer a:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        .error-list {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            list-style: none;
        }

        .error-list li {
            color: #ff8a80;
            font-size: 0.88rem;
            padding: 3px 0;
        }

        .error-list li::before {
            content: '⚠ ';
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(200, 230, 201, 0.3);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(102, 255, 178, 0.12);
        }

        /* POST DETAIL */
        .post-detail-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .post-hero {
            width: 100%;
            height: 440px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 32px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--green-muted);
            font-size: 0.9rem;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4caf50, #00e676);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #0a1a0d;
        }

        .post-date {
            color: rgba(200, 230, 201, 0.5);
            font-size: 0.85rem;
        }

        .post-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .post-tag {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: var(--green-bright);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .post-title-big {
            font-family: 'Syne', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .post-info-text {
            font-size: 1.1rem;
            color: var(--green-muted);
            margin-bottom: 28px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .post-body {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.9;
            border-top: 1px solid var(--border);
            padding-top: 28px;
        }

        /* Cards tags */
        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 0 1.5rem 1rem;
            position: relative;
            z-index: 2;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            #greet {
                font-size: 2rem;
                margin: 2rem 0 1.5rem;
            }

            .content-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1.5rem 20px;
            }

            .auth-card {
                padding: 36px 28px;
            }

            .post-title-big {
                font-size: 1.8rem;
            }

            .post-hero {
                height: 280px;
            }

            nav {
                padding: 0 20px;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <div class="noise"></div>

    <nav>
        <a href="/" class="nav-logo">BlogHub</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
            <span style="color:var(--text-muted); font-size:0.88rem; padding: 0 8px;">{{ user.name }}</span>
            <a href="{% url 'post_create' %}" class="nav-link">+ New Post</a>
            <a href="{% url 'logout' %}" class="nav-link">Sign Out</a>
            {% else %}
            <a href="{% url 'login' %}" class="nav-link">Log In</a>
            <a href="{% url 'signup' %}" class="nav-link primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <div class="page-wrap">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
